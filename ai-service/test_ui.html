<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HomeGrow AI — Dev Test Console</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --forest:   #0d1f0d;
      --canopy:   #162716;
      --moss:     #1e3a1e;
      --leaf:     #2e5c2e;
      --sage:     #5a8f5a;
      --lime:     #8fc98f;
      --cream:    #f0e8d0;
      --parchment:#d9cdb0;
      --amber:    #c9963a;
      --amber-lt: #e8b84b;
      --red:      #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: var(--forest);
      color: var(--cream);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(46,92,46,0.35) 0%, transparent 70%);
    }
    .content { position: relative; z-index: 1; }
    .card { background: var(--canopy); border: 1px solid var(--moss); border-radius: 12px; }
    .tab-btn { transition: all .2s; }
    .tab-btn.active { background: var(--leaf); color: var(--cream); }
    .tab-btn:not(.active) { color: var(--lime); }
    .tab-btn:not(.active):hover { background: var(--moss); }
    label { font-size: 0.8rem; font-weight: 500; color: var(--lime); letter-spacing: .05em; text-transform: uppercase; display: block; margin-bottom: 4px; }
    input, select, textarea {
      width: 100%; background: var(--moss); border: 1px solid var(--leaf);
      border-radius: 8px; padding: 10px 14px; color: var(--cream);
      font-family: inherit; font-size: 0.9rem; outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--sage); }
    input::placeholder, textarea::placeholder { color: var(--sage); opacity: .7; }
    select option { background: var(--moss); }
    .btn-primary {
      background: var(--leaf); color: var(--cream); border: none; border-radius: 8px;
      padding: 12px 24px; font-family: inherit; font-size: 0.95rem; font-weight: 500;
      cursor: pointer; transition: background .2s; width: 100%;
    }
    .btn-primary:hover { background: var(--sage); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: transparent; color: var(--lime); border: 1px solid var(--leaf);
      border-radius: 8px; padding: 8px 16px; font-family: inherit; font-size: 0.85rem;
      cursor: pointer; transition: all .2s;
    }
    .btn-secondary:hover { background: var(--moss); }
    .status-bar {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.8rem; padding: 8px 14px; border-radius: 8px;
      background: var(--moss); border: 1px solid var(--leaf);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot-green { background: #4ade80; }
    .dot-red { background: var(--red); }
    .dot-yellow { background: var(--amber); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:.4 } }
    .plant-card { background: var(--moss); border: 1px solid var(--leaf); border-radius: 10px; padding: 16px; }
    .score-bar { height: 6px; border-radius: 3px; background: var(--leaf); overflow: hidden; }
    .score-fill { height: 100%; background: linear-gradient(90deg, var(--sage), var(--amber-lt)); border-radius: 3px; transition: width .6s ease; }
    .severity-low { background: rgba(74,222,128,.15); color: #4ade80; border: 1px solid rgba(74,222,128,.3); }
    .severity-moderate { background: rgba(201,150,58,.15); color: var(--amber-lt); border: 1px solid rgba(201,150,58,.3); }
    .severity-high { background: rgba(192,57,43,.15); color: #ff6b6b; border: 1px solid rgba(192,57,43,.3); }
    .err { background: rgba(192,57,43,.12); border: 1px solid rgba(192,57,43,.35); border-radius: 8px; padding: 12px; color: #ff8080; font-size: .85rem; }
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--sage); border-top-color: var(--cream); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .tag { display: inline-block; font-size: .7rem; padding: 2px 8px; border-radius: 20px; background: var(--leaf); color: var(--lime); }
    .mono { font-family: monospace; font-size: .78rem; color: var(--sage); }
  </style>
</head>
<body>
<div class="content max-w-3xl mx-auto px-4 py-8">

  <!-- Header -->
  <div class="text-center mb-8">
    <h1 style="font-family:'Playfair Display',serif; font-size:2rem; color:var(--amber-lt);">🌿 HomeGrow AI</h1>
    <p style="color:var(--sage); font-size:.85rem; margin-top:4px;">Dev Test Console — Direct FastAPI + MongoDB</p>
  </div>

  <!-- Health bar -->
  <div class="status-bar mb-6" id="healthBar">
    <div class="dot dot-yellow" id="healthDot"></div>
    <span id="healthText">Checking service…</span>
    <button class="btn-secondary ml-auto" style="padding:4px 12px;font-size:.75rem;" onclick="checkHealth()">Refresh</button>
  </div>

  <!-- Tabs -->
  <div style="display:flex;gap:8px;margin-bottom:24px;">
    <button class="tab-btn active" style="flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:.9rem;cursor:pointer;border:none;" onclick="switchTab('recommend',this)">🌱 Recommend</button>
    <button class="tab-btn" style="flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:.9rem;cursor:pointer;border:none;" onclick="switchTab('diagnose',this)">🔬 Diagnose</button>
    <button class="tab-btn" style="flex:1;padding:10px;border-radius:8px;font-family:inherit;font-size:.9rem;cursor:pointer;border:none;" onclick="switchTab('plants',this)">📋 Plants DB</button>
  </div>

  <!-- ===================== RECOMMEND TAB ===================== -->
  <div id="tab-recommend">
    <div class="card p-6 mb-4">
      <h2 style="font-size:1rem;font-weight:500;color:var(--amber);margin-bottom:16px;">POST /api/recommend</h2>
      <div style="display:grid;gap:14px;">
        <div>
          <label>User ID (optional MongoDB ObjectId)</label>
          <input type="text" id="rec-userId" placeholder="65f1a2b3c4d5e6f7a8b9c001" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label>Location / Space Type</label>
            <select id="rec-location">
              <option>Balcony</option>
              <option>Indoor</option>
              <option>Rooftop</option>
              <option>Windowsill</option>
              <option>Garden</option>
            </select>
          </div>
          <div>
            <label>Sunlight Level</label>
            <select id="rec-sunlight">
              <option>Full Sun</option>
              <option>Partial Shade</option>
              <option>Low Light</option>
            </select>
          </div>
        </div>
        <div>
          <label>Growing Goal</label>
          <input type="text" id="rec-goal" value="Cooking herbs" placeholder="e.g. Cooking herbs, Low maintenance, Vegetables" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;">
          <div>
            <label>Sunlight Hours / day</label>
            <input type="number" id="rec-sunlightHours" placeholder="6" min="0" max="24" step="0.5" />
          </div>
          <div>
            <label>Temperature (°C)</label>
            <input type="number" id="rec-temperature" placeholder="28" min="0" max="50" />
          </div>
          <div>
            <label>Humidity (%)</label>
            <input type="number" id="rec-humidity" placeholder="70" min="0" max="100" />
          </div>
        </div>
        <button class="btn-primary" id="recBtn" onclick="runRecommend()">Get Recommendations</button>
      </div>
    </div>
    <div id="rec-result"></div>
  </div>

  <!-- ===================== DIAGNOSE TAB ===================== -->
  <div id="tab-diagnose" style="display:none;">
    <div class="card p-6 mb-4">
      <h2 style="font-size:1rem;font-weight:500;color:var(--amber);margin-bottom:16px;">POST /api/diagnose</h2>
      <div style="display:grid;gap:14px;">
        <div>
          <label>User ID (optional)</label>
          <input type="text" id="diag-userId" placeholder="65f1a2b3c4d5e6f7a8b9c001" />
        </div>
        <div>
          <label>Plant Image</label>
          <input type="file" id="diag-file" accept="image/*" onchange="previewImage(this)" style="padding:8px;" />
          <img id="diag-preview" src="" alt="" style="display:none;max-height:180px;border-radius:8px;margin-top:8px;border:1px solid var(--leaf);" />
        </div>
        <div>
          <label>Image URL (optional — stored in DB if no file)</label>
          <input type="text" id="diag-imageUrl" placeholder="https://example.com/leaf.jpg" />
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div>
            <label>Crop Type</label>
            <input type="text" id="diag-cropType" value="Tomato" placeholder="e.g. Tomato, Chilli, Basil" />
          </div>
          <div>
            <label>Growth Stage</label>
            <select id="diag-growthStage">
              <option>Seedling</option>
              <option>Vegetative</option>
              <option selected>Flowering</option>
              <option>Fruiting</option>
              <option>Mature</option>
            </select>
          </div>
        </div>
        <div>
          <label>Symptoms / Issue</label>
          <input type="text" id="diag-symptoms" value="Yellowing leaves" placeholder="Describe what you see…" />
        </div>
        <button class="btn-primary" id="diagBtn" onclick="runDiagnose()">Analyse Plant</button>
      </div>
    </div>
    <div id="diag-result"></div>
  </div>

  <!-- ===================== PLANTS TAB ===================== -->
  <div id="tab-plants" style="display:none;">
    <div class="card p-6 mb-4" style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h2 style="font-size:1rem;font-weight:500;color:var(--amber);">GET /api/plants</h2>
        <p style="font-size:.8rem;color:var(--sage);margin-top:2px;">All plants in MongoDB</p>
      </div>
      <button class="btn-secondary" onclick="loadPlants()">Load Plants</button>
    </div>
    <div id="plants-result"></div>
  </div>

</div>

<script>
const BASE = 'http://localhost:8000';

// ── Tab switching ──────────────────────────────────────────────
function switchTab(name, btn) {
  ['recommend','diagnose','plants'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t === name ? '' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

// ── Health check ───────────────────────────────────────────────
async function checkHealth() {
  const dot = document.getElementById('healthDot');
  const txt = document.getElementById('healthText');
  dot.className = 'dot dot-yellow';
  txt.textContent = 'Checking…';
  try {
    const r = await fetch(BASE + '/health');
    const d = await r.json();
    const dbOk = d.db === 'connected';
    dot.className = 'dot ' + (dbOk ? 'dot-green' : 'dot-yellow');
    txt.textContent = `Service online · model: ${d.model} · DB: ${d.db}${d.dbError ? ' — ' + d.dbError : ''}`;
  } catch(e) {
    dot.className = 'dot dot-red';
    txt.textContent = 'Service offline — ' + e.message;
  }
}

// ── Recommend ─────────────────────────────────────────────────
async function runRecommend() {
  const btn = document.getElementById('recBtn');
  const out = document.getElementById('rec-result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  out.innerHTML = '';

  const body = {
    location: document.getElementById('rec-location').value,
    sunlight: document.getElementById('rec-sunlight').value,
    goal: document.getElementById('rec-goal').value,
  };
  const uid = document.getElementById('rec-userId').value.trim();
  if (uid) body.userId = uid;
  const sh = document.getElementById('rec-sunlightHours').value;
  if (sh) body.sunlightHours = parseFloat(sh);
  const temp = document.getElementById('rec-temperature').value;
  if (temp) body.temperature = parseFloat(temp);
  const hum = document.getElementById('rec-humidity').value;
  if (hum) body.humidity = parseFloat(hum);

  try {
    const r = await fetch(BASE + '/api/recommend', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    out.innerHTML = renderRecommendResult(d);
  } catch(e) {
    out.innerHTML = `<div class="err">⚠ ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Get Recommendations';
  }
}

function renderRecommendResult(d) {
  const plants = d.plants || [];
  let html = `<div style="margin-bottom:10px;"><span class="mono">recommendationId: ${d.recommendationId || 'n/a'}</span></div>`;
  if (!plants.length) return html + '<div class="err">No plants returned.</div>';
  html += plants.map(p => `
    <div class="plant-card mb-3">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
        <span style="font-size:2rem;">${p.emoji || '🌱'}</span>
        <div style="flex:1;">
          <div style="font-size:1rem;font-weight:500;">${p.name}</div>
          <div style="font-size:.78rem;color:var(--sage);font-style:italic;">${p.botanicalName || ''}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:1.2rem;font-weight:700;color:var(--amber-lt);">${p.successRate}%</div>
          <div style="font-size:.7rem;color:var(--sage);">match</div>
        </div>
      </div>
      <div class="score-bar mb-3"><div class="score-fill" style="width:${p.successRate}%"></div></div>
      <p style="font-size:.85rem;color:var(--parchment);margin-bottom:10px;">${p.reason}</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        <span class="tag">${p.category}</span>
        <span class="tag">${p.difficulty}</span>
        <span class="tag">${p.spaceType}</span>
      </div>
      ${p.careTips ? `
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;font-size:.78rem;">
        <div style="background:var(--canopy);border-radius:6px;padding:8px;text-align:center;">
          <div style="color:var(--sage);">💧 Water</div>
          <div style="color:var(--cream);margin-top:2px;">${p.careTips.waterFreq || '—'}</div>
        </div>
        <div style="background:var(--canopy);border-radius:6px;padding:8px;text-align:center;">
          <div style="color:var(--sage);">☀️ Sun</div>
          <div style="color:var(--cream);margin-top:2px;">${p.careTips.sunNeeds || '—'}</div>
        </div>
        <div style="background:var(--canopy);border-radius:6px;padding:8px;text-align:center;">
          <div style="color:var(--sage);">📅 Grow</div>
          <div style="color:var(--cream);margin-top:2px;">${p.careTips.growTime ? p.careTips.growTime + ' days' : '—'}</div>
        </div>
      </div>` : ''}
      <div style="margin-top:8px;"><span class="mono">plantId: ${p.plantId}</span></div>
    </div>
  `).join('');
  return html;
}

// ── Diagnose ──────────────────────────────────────────────────
let _base64Image = null;

function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    _base64Image = e.target.result;
    const prev = document.getElementById('diag-preview');
    prev.src = e.target.result;
    prev.style.display = 'block';
  };
  reader.readAsDataURL(file);
}

async function runDiagnose() {
  const btn = document.getElementById('diagBtn');
  const out = document.getElementById('diag-result');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>';
  out.innerHTML = '';

  const body = {
    cropType: document.getElementById('diag-cropType').value,
    growthStage: document.getElementById('diag-growthStage').value,
    symptoms: document.getElementById('diag-symptoms').value,
  };
  const uid = document.getElementById('diag-userId').value.trim();
  if (uid) body.userId = uid;
  const imgUrl = document.getElementById('diag-imageUrl').value.trim();
  if (imgUrl) body.imageUrl = imgUrl;
  if (_base64Image) body.image = _base64Image;

  if (!body.image && !body.imageUrl) {
    out.innerHTML = '<div class="err">⚠ Please upload an image or provide an image URL.</div>';
    btn.disabled = false;
    btn.textContent = 'Analyse Plant';
    return;
  }

  try {
    const r = await fetch(BASE + '/api/diagnose', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || r.statusText);
    out.innerHTML = renderDiagnoseResult(d);
  } catch(e) {
    out.innerHTML = `<div class="err">⚠ ${e.message}</div>`;
  } finally {
    btn.disabled = false;
    btn.textContent = 'Analyse Plant';
  }
}

function renderDiagnoseResult(d) {
  const ai = d.aiResult || {};
  const crop = d.cropIdentified || {};
  const alts = d.alternatives || [];
  const sev = (ai.severity || 'Low').toLowerCase();
  const sevClass = sev === 'high' ? 'severity-high' : sev === 'moderate' ? 'severity-moderate' : 'severity-low';
  const conf = ai.confidenceScore || 0;

  const altsHtml = alts.length ? `
    <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--moss);">
      <div style="font-size:.75rem;color:var(--sage);margin-bottom:10px;letter-spacing:.05em;">ALTERNATIVE POSSIBILITIES</div>
      ${alts.map(a => `
        <div style="background:var(--forest);border:1px solid var(--moss);border-radius:8px;padding:12px;margin-bottom:8px;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:.9rem;font-weight:500;">${a.problem}</span>
            <span style="font-size:.8rem;color:var(--amber);font-weight:600;">${a.likelihood}%</span>
          </div>
          <div style="font-size:.8rem;color:var(--parchment);margin-bottom:4px;"><span style="color:var(--sage);">Why: </span>${a.cause}</div>
          <div style="font-size:.8rem;color:var(--parchment);"><span style="color:var(--sage);">If so: </span>${a.solution}</div>
        </div>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="card p-5">

      ${crop.name ? `
      <div style="background:var(--moss);border-radius:8px;padding:12px;margin-bottom:14px;display:flex;align-items:center;gap:12px;">
        <div style="font-size:2rem;">🌿</div>
        <div>
          <div style="font-size:.7rem;color:var(--sage);letter-spacing:.05em;margin-bottom:2px;">CROP IDENTIFIED</div>
          <div style="font-size:1rem;font-weight:600;">${crop.name}</div>
          ${crop.botanicalName ? `<div style="font-size:.78rem;color:var(--sage);font-style:italic;">${crop.botanicalName}</div>` : ''}
          ${crop.description ? `<div style="font-size:.8rem;color:var(--parchment);margin-top:3px;">${crop.description}</div>` : ''}
        </div>
      </div>` : ''}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-size:.7rem;color:var(--sage);letter-spacing:.05em;margin-bottom:2px;">PRIMARY DIAGNOSIS</div>
          <div style="font-size:1.1rem;font-weight:600;">${ai.problem || 'Unknown'}</div>
          <div style="font-size:.8rem;color:var(--sage);margin-top:2px;">${d.growthStage} stage</div>
        </div>
        <span style="font-size:.8rem;padding:4px 12px;border-radius:20px;" class="${sevClass}">${ai.severity}</span>
      </div>

      <div style="margin-bottom:12px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <div style="font-size:.75rem;color:var(--sage);">CONFIDENCE</div>
          <span style="font-size:.85rem;font-weight:600;color:var(--amber-lt);">${conf}%</span>
        </div>
        <div class="score-bar"><div class="score-fill" style="width:${conf}%"></div></div>
      </div>

      <div style="display:grid;gap:10px;font-size:.85rem;margin-bottom:4px;">
        <div><span style="color:var(--sage);">Cause: </span>${ai.cause}</div>
        <div><span style="color:var(--sage);">Solution: </span>${ai.solution}</div>
        ${d.flaggedForReview ? '<div style="color:var(--amber);">⚠ Low confidence — flagged for expert review</div>' : ''}
      </div>

      ${altsHtml}

      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--moss);">
        <span class="mono">diagnosisId: ${d.diagnosisId || 'n/a'}</span>
      </div>
    </div>
  `;
}

// ── Plants DB ─────────────────────────────────────────────────
async function loadPlants() {
  const out = document.getElementById('plants-result');
  out.innerHTML = '<div class="status-bar"><div class="dot dot-yellow"></div>Loading plants from MongoDB…</div>';
  try {
    const r = await fetch(BASE + '/api/plants');
    const plants = await r.json();
    if (!r.ok) throw new Error(plants.detail || r.statusText);
    if (!plants.length) {
      out.innerHTML = '<div class="err">No plants found in database.</div>';
      return;
    }
    out.innerHTML = `
      <div style="margin-bottom:10px;font-size:.8rem;color:var(--sage);">${plants.length} plants found</div>
      ${plants.map(p => `
        <div class="plant-card mb-3" style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:1.8rem;">${p.emoji || '🌱'}</span>
          <div style="flex:1;">
            <div style="font-weight:500;">${p.name}</div>
            <div style="font-size:.78rem;color:var(--sage);font-style:italic;">${p.botanicalName || ''}</div>
            <div style="display:flex;gap:6px;margin-top:4px;flex-wrap:wrap;">
              <span class="tag">${p.category}</span>
              <span class="tag">${p.difficulty}</span>
              <span class="tag">${p.spaceType}</span>
            </div>
          </div>
          <div style="text-align:right;">
            <div class="mono">${p._id}</div>
          </div>
        </div>
      `).join('')}
    `;
  } catch(e) {
    out.innerHTML = `<div class="err">⚠ ${e.message}</div>`;
  }
}

// ── Init ───────────────────────────────────────────────────────
checkHealth();
